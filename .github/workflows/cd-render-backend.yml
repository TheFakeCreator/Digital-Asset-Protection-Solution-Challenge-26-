name: CD Render Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/cd-render-backend.yml
      - render.yaml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
